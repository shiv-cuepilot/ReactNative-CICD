// Top-level Gradle plugins
apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"


// Load secure signing properties.
// Priority: EAS (env vars) → local .env.signing → debug/dev fallback (no keystore).
// The keystore is ONLY required for local RELEASE builds; debug/dev builds and
// `./gradlew clean` work without it (they use the Android debug keystore).
def signingPropsFile = rootProject.file("../.env.signing")
def isEasBuild = System.getenv("EAS_BUILD") != null
def isReleaseBuild = gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }

if (isEasBuild) {
    ext.UPLOAD_STORE_FILE      = System.getenv("ANDROID_KEYSTORE_PATH")     ?: ""
    ext.UPLOAD_STORE_PASSWORD = System.getenv("ANDROID_KEYSTORE_PASSWORD")  ?: ""
    ext.UPLOAD_KEY_ALIAS      = System.getenv("ANDROID_KEY_ALIAS")          ?: ""
    ext.UPLOAD_KEY_PASSWORD   = System.getenv("ANDROID_KEY_PASSWORD")       ?: ""
} else if (signingPropsFile.exists()) {
    def signingProps = new Properties()
    signingProps.load(new FileInputStream(signingPropsFile))

    ext.UPLOAD_STORE_FILE      = signingProps['UPLOAD_STORE_FILE']
    ext.UPLOAD_STORE_PASSWORD = signingProps['UPLOAD_STORE_PASSWORD']
    ext.UPLOAD_KEY_ALIAS      = signingProps['UPLOAD_KEY_ALIAS']
    ext.UPLOAD_KEY_PASSWORD   = signingProps['UPLOAD_KEY_PASSWORD']
} else if (isReleaseBuild) {
    throw new FileNotFoundException(
        "🛑 .env.signing file is missing (needed only for local RELEASE builds).\n" +
        "   Copy .env.signing.example → .env.signing and fill in your keystore values."
    )
} else {
    ext.UPLOAD_STORE_FILE      = ""
    ext.UPLOAD_STORE_PASSWORD = ""
    ext.UPLOAD_KEY_ALIAS      = ""
    ext.UPLOAD_KEY_PASSWORD   = ""
}

// Environment files per build type + flavor
project.ext.envConfigFiles = [
    productiondebug:     ".env.production",
    productionrelease:   ".env.production",
    developmentdebug:    ".env.development",
    developmentrelease:  ".env.development",
    stagingdebug:        ".env.staging",
    stagingrelease:      ".env.staging"
]

// Apply react-native-config dotenv support
apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

react {
    autolinkLibrariesWithApp()
}

// Configuration switches
def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion       rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk       rootProject.ext.compileSdkVersion
    namespace        "com.snapbiodata.app"

    defaultConfig {
        applicationId       "com.snapbiodata.app"
        minSdkVersion       rootProject.ext.minSdkVersion
        targetSdkVersion    rootProject.ext.targetSdkVersion
        versionCode         22
        versionName         "1.0.0"
    }

    flavorDimensions "default"

    // Each flavor gets its own applicationId so development / staging / production
    // can be installed side-by-side on one device. build_config_package stays the
    // namespace (com.snapbiodata.app) — that's where BuildConfig is generated,
    // regardless of the suffixed applicationId.
    productFlavors {
        production {
            // com.snapbiodata.app  (the real Play Store / App Store identity)
            resValue "string", "build_config_package", "com.snapbiodata.app"
        }
        development {
            applicationIdSuffix ".development"   // com.snapbiodata.app.development
            resValue "string", "build_config_package", "com.snapbiodata.app"
        }
        staging {
            applicationIdSuffix ".staging"       // com.snapbiodata.app.staging
            resValue "string", "build_config_package", "com.snapbiodata.app"
        }
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
        release {
            storeFile     UPLOAD_STORE_FILE ? rootProject.file(UPLOAD_STORE_FILE) : null
            storePassword UPLOAD_STORE_PASSWORD ?: ""
            keyAlias      UPLOAD_KEY_ALIAS      ?: ""
            keyPassword   UPLOAD_KEY_PASSWORD   ?: ""
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig     signingConfigs.release
            minifyEnabled     enableProguardInReleaseBuilds
            proguardFiles     getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            matchingFallbacks = ["debug", "release"]
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}


