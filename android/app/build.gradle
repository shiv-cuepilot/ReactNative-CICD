// Top-level Gradle plugins
apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"


// Load secure signing properties.
//
// Priority order:
//  1. EAS Build (EAS_BUILD env var set) → EAS injects keystore via its own env vars
//  2. Local .env.signing file           → for local Gradle / Fastlane builds
//  3. Neither found                     → throw a helpful error
def signingPropsFile = rootProject.file("../.env.signing")
def isEasBuild = System.getenv("EAS_BUILD") != null

if (isEasBuild) {
    // EAS managed credentials: EAS injects keystore path + passwords as env vars.
    // If env vars are absent, EAS is handling signing externally — use empty strings.
    ext.UPLOAD_STORE_FILE      = System.getenv("ANDROID_KEYSTORE_PATH")     ?: ""
    ext.UPLOAD_STORE_PASSWORD = System.getenv("ANDROID_KEYSTORE_PASSWORD")  ?: ""
    ext.UPLOAD_KEY_ALIAS      = System.getenv("ANDROID_KEY_ALIAS")          ?: ""
    ext.UPLOAD_KEY_PASSWORD   = System.getenv("ANDROID_KEY_PASSWORD")       ?: ""
} else if (signingPropsFile.exists()) {
    def signingProps = new Properties()
    signingProps.load(new FileInputStream(signingPropsFile))

    ext.UPLOAD_STORE_FILE      = signingProps['UPLOAD_STORE_FILE']
    ext.UPLOAD_STORE_PASSWORD = signingProps['UPLOAD_STORE_PASSWORD']
    ext.UPLOAD_KEY_ALIAS      = signingProps['UPLOAD_KEY_ALIAS']
    ext.UPLOAD_KEY_PASSWORD   = signingProps['UPLOAD_KEY_PASSWORD']
} else {
    throw new FileNotFoundException(
        "🛑 .env.signing file is missing.\n" +
        "   Copy .env.signing.example → .env.signing and fill in your keystore values.\n" +
        "   See docs/EAS.md for setup instructions."
    )
}

// Environment files per build type + flavor.
// Local overrides (e.g. .env.production.local) let each engineer keep private keys
// outside git while sharing non-sensitive defaults in .env.*.
def resolveEnvFile = { baseEnv ->
    def localOverride = "${baseEnv}.local"
    return rootProject.file("../${localOverride}").exists() ? localOverride : baseEnv
}
project.ext.envConfigFiles = [
    productiondebug:     resolveEnvFile(".env.production"),
    productionrelease:   resolveEnvFile(".env.production"),
    developmentdebug:    resolveEnvFile(".env.development"),
    developmentrelease:  resolveEnvFile(".env.development"),
    stagingdebug:        resolveEnvFile(".env.staging"),
    stagingrelease:      resolveEnvFile(".env.staging")
]

// Guard against leaked ENVFILE forcing the wrong env (common on CI/EAS).
def taskNames = gradle.startParameter.taskNames.collect { it.toLowerCase() }
def expectedEnvFile = null
if (taskNames.any { it.contains("development") }) {
    expectedEnvFile = ".env.development"
} else if (taskNames.any { it.contains("staging") }) {
    expectedEnvFile = ".env.staging"
} else if (taskNames.any { it.contains("production") }) {
    expectedEnvFile = ".env.production"
}
def forcedEnvFile = System.getenv("ENVFILE")
if (forcedEnvFile && expectedEnvFile && forcedEnvFile != expectedEnvFile) {
    throw new RuntimeException(
        "ENVFILE mismatch for selected flavor tasks.\n" +
        "Expected: ${expectedEnvFile}\n" +
        "Received: ${forcedEnvFile}\n" +
        "Fix: set build profile env.ENVFILE in eas.json for each profile."
    )
}
if (expectedEnvFile) {
    // Force the default .env when Android Studio invokes bundle-only tasks
    // (e.g. createBundleProductionReleaseJsAndAssets), where react-native-config
    // flavor parsing can otherwise fall back to plain ".env".
    project.ext.defaultEnvFile = expectedEnvFile
}

// Apply react-native-config dotenv support
apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

react {
    autolinkLibrariesWithApp()
    //
    // Added by install-expo-modules
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", rootDir.getAbsoluteFile().getParentFile().getAbsolutePath(), "android", "absolute"].execute(null, rootDir).text.trim())
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli')"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"
}

// Configuration switches
def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion       rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk       rootProject.ext.compileSdkVersion
    namespace        "com.snapbiodata.app"

    defaultConfig {
        applicationId       "com.snapbiodata.app"
        minSdkVersion       rootProject.ext.minSdkVersion
        targetSdkVersion    rootProject.ext.targetSdkVersion
        versionCode         22
        versionName         "1.0.0"
    }

    flavorDimensions "default"

    /**
     * Three flavors — development, staging, production — share the same applicationId
     * so they map to one Play Store app on different tracks (internal, beta, production).
     */

    productFlavors {
        development {
            applicationId "com.snapbiodata.app"
            resValue "string", "build_config_package", "com.snapbiodata.app"
        }
        staging {
            applicationId "com.snapbiodata.app"
            resValue "string", "build_config_package", "com.snapbiodata.app"
        }
        production {
            applicationId "com.snapbiodata.app"
            resValue "string", "build_config_package", "com.snapbiodata.app"
        }
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
        release {
            storeFile     UPLOAD_STORE_FILE ? rootProject.file(UPLOAD_STORE_FILE) : null
            storePassword UPLOAD_STORE_PASSWORD ?: ""
            keyAlias      UPLOAD_KEY_ALIAS      ?: ""
            keyPassword   UPLOAD_KEY_PASSWORD   ?: ""
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig     signingConfigs.release
            minifyEnabled     enableProguardInReleaseBuilds
            proguardFiles     getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            matchingFallbacks = ["debug", "release"]
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}


