name: EAS Update (OTA)

# Pushes a JavaScript-only over-the-air update to a channel.
# Use this for JS/asset changes that don't require a new native build.
# See docs/EAS.md — "OTA UPDATE OR NEW BUILD?" for decision guidance.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      message:
        description: 'Update message (shown in EAS dashboard)'
        required: false
        default: 'OTA update'

# Cancel any in-flight update to the same channel to avoid race conditions.
concurrency:
  group: eas-update-${{ github.event.inputs.channel }}
  cancel-in-progress: true

jobs:
  update:
    name: EAS Update → ${{ github.event.inputs.channel }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Update
        run: |
          eas update \
            --channel ${{ github.event.inputs.channel }} \
            --message "${{ github.event.inputs.message }}" \
            --non-interactive
