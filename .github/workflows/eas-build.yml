name: EAS Build

# Trigger manually from the Actions tab.
# Choose a profile (development / staging / production) and platform (all / android / ios).
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios

# Cancel any in-flight build for the same profile + platform to avoid wasted minutes.
concurrency:
  group: eas-build-${{ github.event.inputs.profile }}-${{ github.event.inputs.platform }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.profile }} / ${{ github.event.inputs.platform }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Informational only — does not block the build.
      # Fix any reported mismatches before the next release.
      - name: Check version consistency
        run: yarn eas:version:get
        continue-on-error: true

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Build
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive
